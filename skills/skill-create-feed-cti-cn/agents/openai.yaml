interface:
  display_name: "Create Feed CTI CN"
  short_description: "Review a Chinese Telegram message or group link, snapshot up to 100 messages locally, and create a bilingual CTI feed only when the evidence is in scope."
  default_prompt: "Use $skill-create-feed-cti-cn with either a Telegram message link such as https://t.me/<chat>/<message_id> or a Telegram group link such as https://t.me/<chat>. Build a local conversation/<threat_actor>/ snapshot, review up to 100 target-chat messages, and create a bilingual CTI feed only when the evidence clearly passes scope."
dependencies:
  tools:
    - type: "mcp"
      value: "telegram"
      description: "Telegram MCP tools for message context and chat metadata."
policy:
  allow_implicit_invocation: false
